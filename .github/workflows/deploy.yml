name: Deploy Reflex App

on:
  push:
    branches:
      - source

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Export Reflex Frontend
        run: |
          reflex export --frontend-only

      - name: Unzip exported files & add .nojekyll
        run: |
          # Create a temporary directory for the build
          mkdir -p reflex_build
          
          # Unzip the frontend.zip generated by Reflex
          unzip frontend.zip -d reflex_build
          
          # Create the empty .nojekyll file so GitHub Pages serves _next/ folders
          touch reflex_build/.nojekyll

      - name: Deploy to main branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: main
          publish_dir: ./reflex_build
          force_orphan: true 